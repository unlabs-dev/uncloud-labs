{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Issue Tracker{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'tracker/style.css' %}">
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="{% url 'issue_list' %}">🎯 Issue Tracker</a></h1>
            <nav>
                <a href="{% url 'issue_list' %}">All Issues</a>
                <a href="{% url 'issue_create' %}" class="btn btn-primary">New Issue</a>
                <a href="/admin/">Admin</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>Django Issue Tracker - Built with Django {{ 5.2 }}</p>
        </div>
    </footer>
</body>
</html>
